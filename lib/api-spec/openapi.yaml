openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Khabar — hyperlocal citizen journalism API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication and current user
  - name: users
    description: Public user profiles and reputation
  - name: posts
    description: Citizen news posts
  - name: trends
    description: Trending localities and leaderboards
  - name: storage
    description: Object storage uploads
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                  minLength: 3
                  maxLength: 24
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
                displayName:
                  type: string
                  minLength: 2
                  maxLength: 50
                state:
                  type: string
                district:
                  type: string
                locality:
                  type: string
                phoneNumber:
                  type: string
                photoUrl:
                  type: string
              required:
                - username
                - email
                - password
                - displayName
                - state
                - district
                - locality
      responses:
        "201":
          description: Created user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUser"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Conflict (username or email already taken)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with email + password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
              required:
                - email
                - password
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUser"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Clear the current session token
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                required:
                  - ok

  /auth/me:
    get:
      operationId: getCurrentUser
      tags: [auth]
      summary: Get the currently authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUser"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    patch:
      operationId: updateCurrentUser
      tags: [auth]
      summary: Update the authenticated user's profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                displayName:
                  type: string
                state:
                  type: string
                district:
                  type: string
                locality:
                  type: string
                phoneNumber:
                  type: string
                photoUrl:
                  type: string
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUser"

  /auth/check-availability:
    get:
      operationId: checkAvailability
      tags: [auth]
      summary: Check whether a username or email is available
      parameters:
        - name: username
          in: query
          required: false
          schema:
            type: string
        - name: email
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Availability
          content:
            application/json:
              schema:
                type: object
                properties:
                  usernameAvailable:
                    type: boolean
                  emailAvailable:
                    type: boolean

  /storage/uploads/request-url:
    post:
      operationId: requestUploadUrl
      tags: [storage]
      summary: Request a presigned URL for direct file upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestUploadUrlBody"
      responses:
        "200":
          description: Upload URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestUploadUrlResponse"

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users
      responses:
        "200":
          description: Users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

  /users/top:
    get:
      operationId: listTopReporters
      tags: [users, trends]
      summary: Top reporters leaderboard sorted by reputation
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 8
      responses:
        "200":
          description: Top reporters
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get user profile with reputation history
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /posts:
    get:
      operationId: listPosts
      tags: [posts]
      summary: List news posts
      description: Returns posts sorted by newest first with breaking pinned to top.
      parameters:
        - name: category
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PostCategory"
        - name: authorId
          in: query
          required: false
          schema:
            type: string
        - name: savedBy
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Post"
    post:
      operationId: createPost
      tags: [posts]
      summary: Create a news post (requires auth)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                headline:
                  type: string
                details:
                  type: string
                category:
                  $ref: "#/components/schemas/PostCategory"
                isBreaking:
                  type: boolean
                neighborhood:
                  type: string
              required:
                - headline
                - details
                - category
                - isBreaking
      responses:
        "201":
          description: Created post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /posts/{id}:
    get:
      operationId: getPost
      tags: [posts]
      summary: Get a single post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /posts/{id}/vote:
    post:
      operationId: votePost
      tags: [posts]
      summary: Upvote or downvote a post (requires auth)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VoteBody"
      responses:
        "200":
          description: Updated post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"

  /posts/{id}/verify:
    post:
      operationId: verifyPost
      tags: [posts]
      summary: Advance a post's verification status (requires auth)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyBody"
      responses:
        "200":
          description: Updated post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"

  /posts/{id}/save:
    post:
      operationId: savePost
      tags: [posts]
      summary: Save (bookmark) or unsave a post (requires auth)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveBody"
      responses:
        "200":
          description: Save status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SaveStatus"

  /trending/localities:
    get:
      operationId: listTrendingLocalities
      tags: [trends]
      summary: Trending neighborhoods/localities
      responses:
        "200":
          description: Trending localities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TrendingLocality"

  /stats/overview:
    get:
      operationId: getStatsOverview
      tags: [trends]
      summary: Aggregate stats for the home / explore surface
      responses:
        "200":
          description: Overview stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatsOverview"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Error:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    PostCategory:
      type: string
      enum:
        - infrastructure
        - crime
        - politics
        - event

    VerificationStatus:
      type: string
      enum:
        - unverified
        - community
        - editor
        - verified

    Location:
      type: object
      properties:
        lat:
          type: number
        lng:
          type: number
        neighborhood:
          type: string
      required:
        - lat
        - lng
        - neighborhood

    ReputationEvent:
      type: object
      properties:
        id:
          type: integer
        date:
          type: string
          format: date-time
        pointsChange:
          type: integer
        reason:
          type: string
      required:
        - id
        - date
        - pointsChange
        - reason

    User:
      type: object
      properties:
        uid:
          type: string
        username:
          type: string
        displayName:
          type: string
        photoUrl:
          type: string
          nullable: true
        currentReputationScore:
          type: integer
        state:
          type: string
        district:
          type: string
        locality:
          type: string
        postCount:
          type: integer
        verifiedCount:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - uid
        - username
        - displayName
        - currentReputationScore
        - state
        - district
        - locality
        - postCount
        - verifiedCount
        - createdAt

    CurrentUser:
      type: object
      properties:
        uid:
          type: string
        username:
          type: string
        displayName:
          type: string
        photoUrl:
          type: string
          nullable: true
        email:
          type: string
        phoneNumber:
          type: string
          nullable: true
        currentReputationScore:
          type: integer
        state:
          type: string
        district:
          type: string
        locality:
          type: string
        isEmailVerified:
          type: boolean
        isPhoneVerified:
          type: boolean
        postCount:
          type: integer
        verifiedCount:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - uid
        - username
        - displayName
        - email
        - currentReputationScore
        - state
        - district
        - locality
        - isEmailVerified
        - isPhoneVerified
        - postCount
        - verifiedCount
        - createdAt

    UserProfile:
      type: object
      properties:
        uid:
          type: string
        username:
          type: string
        displayName:
          type: string
        photoUrl:
          type: string
          nullable: true
        currentReputationScore:
          type: integer
        state:
          type: string
        district:
          type: string
        locality:
          type: string
        postCount:
          type: integer
        verifiedCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        reputationHistory:
          type: array
          items:
            $ref: "#/components/schemas/ReputationEvent"
        recentPosts:
          type: array
          items:
            $ref: "#/components/schemas/Post"
      required:
        - uid
        - username
        - displayName
        - currentReputationScore
        - state
        - district
        - locality
        - postCount
        - verifiedCount
        - createdAt
        - reputationHistory
        - recentPosts

    Post:
      type: object
      properties:
        id:
          type: integer
        authorId:
          type: string
        authorUsername:
          type: string
        authorName:
          type: string
        authorPhotoUrl:
          type: string
          nullable: true
        authorReputation:
          type: integer
        headline:
          type: string
        details:
          type: string
        category:
          $ref: "#/components/schemas/PostCategory"
        isBreaking:
          type: boolean
        location:
          $ref: "#/components/schemas/Location"
        verificationStatus:
          $ref: "#/components/schemas/VerificationStatus"
        upvotes:
          type: integer
        downvotes:
          type: integer
        savedByCurrentUser:
          type: boolean
        currentUserVote:
          type: string
          enum:
            - up
            - down
            - none
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - authorId
        - authorUsername
        - authorName
        - authorReputation
        - headline
        - details
        - category
        - isBreaking
        - location
        - verificationStatus
        - upvotes
        - downvotes
        - savedByCurrentUser
        - currentUserVote
        - createdAt

    VoteBody:
      type: object
      properties:
        direction:
          type: string
          enum:
            - up
            - down
            - clear
      required:
        - direction

    VerifyBody:
      type: object
      properties:
        status:
          $ref: "#/components/schemas/VerificationStatus"
      required:
        - status

    SaveBody:
      type: object
      properties:
        saved:
          type: boolean
      required:
        - saved

    SaveStatus:
      type: object
      properties:
        postId:
          type: integer
        saved:
          type: boolean
      required:
        - postId
        - saved

    TrendingLocality:
      type: object
      properties:
        neighborhood:
          type: string
        postCount:
          type: integer
        breakingCount:
          type: integer
      required:
        - neighborhood
        - postCount
        - breakingCount

    StatsOverview:
      type: object
      properties:
        totalPosts:
          type: integer
        breakingNow:
          type: integer
        verifiedToday:
          type: integer
        activeReporters:
          type: integer
        categoryCounts:
          type: array
          items:
            $ref: "#/components/schemas/CategoryCount"
      required:
        - totalPosts
        - breakingNow
        - verifiedToday
        - activeReporters
        - categoryCounts

    CategoryCount:
      type: object
      properties:
        category:
          $ref: "#/components/schemas/PostCategory"
        count:
          type: integer
      required:
        - category
        - count

    RequestUploadUrlBody:
      type: object
      properties:
        name:
          type: string
        size:
          type: integer
        contentType:
          type: string
      required:
        - name
        - size
        - contentType

    RequestUploadUrlResponse:
      type: object
      properties:
        uploadURL:
          type: string
        objectPath:
          type: string
        metadata:
          type: object
          properties:
            name:
              type: string
            size:
              type: integer
            contentType:
              type: string
          required:
            - name
            - size
            - contentType
      required:
        - uploadURL
        - objectPath
        - metadata
